<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile - Campus Complaint System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <input type="hidden" id="profile-page-marker">

  <!-- Mobile Header -->
  <div id="mobile-header-container"></div>

  <div class="app-container">
    <!-- Sidebar Area -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Header Area (Welcome Banner) -->
      <div id="header-container"></div>

      <!-- Profile Workspace Grid -->
      <div class="profile-grid">
        
        <!-- Left Column: User Summary Card -->
        <div class="card profile-sidebar">
          <div class="user-avatar profile-avatar" id="p-initials">--</div>
          <h2 style="font-size: 1.4rem; margin-top: 10px;" id="p-name">Loading User...</h2>
          <p style="color: var(--text-muted); font-size: 0.9rem; font-weight: 500;" id="p-role">ROLE</p>
          
          <div style="width: 100%; margin-top: 30px; text-align: left;">
            <p style="color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; font-weight: 600; border-bottom: 1px solid var(--card-border); padding-bottom: 8px;">Quick Actions</p>
            <button class="btn btn-secondary btn-sm" onclick="logout()" style="width: 100%; margin-top: 15px;">
              <i class="fa-solid fa-right-from-bracket"></i> Sign Out
            </button>
          </div>
        </div>

        <!-- Right Column: User Details and Password Management -->
        <div style="display: flex; flex-direction: column; gap: 30px;">
          
          <!-- Personal Information Card -->
          <div class="card" style="margin-bottom: 0;">
            <h2 class="card-title"><i class="fa-solid fa-address-card" style="color: var(--primary);"></i> Personal Information</h2>
            
            <div class="profile-info-grid">
              <div class="profile-item">
                <div class="profile-item-label">Full Name</div>
                <div class="profile-item-value" id="prof-name">...</div>
              </div>
              <div class="profile-item">
                <div class="profile-item-label">Register Number</div>
                <div class="profile-item-value" id="prof-register">...</div>
              </div>
              <div class="profile-item">
                <div class="profile-item-label">Email Address</div>
                <div class="profile-item-value" id="prof-email">...</div>
              </div>
              <div class="profile-item">
                <div class="profile-item-label">Phone Number</div>
                <div class="profile-item-value" id="prof-phone">...</div>
              </div>
              <div class="profile-item" id="prof-dept-item">
                <div class="profile-item-label">Department</div>
                <div class="profile-item-value" id="prof-dept">...</div>
              </div>
              <div class="profile-item">
                <div class="profile-item-label">System Role</div>
                <div class="profile-item-value" id="prof-role">...</div>
              </div>
            </div>
          </div>

          <!-- Change Password Card -->
          <div class="card" style="margin-bottom: 0;">
            <h2 class="card-title"><i class="fa-solid fa-key" style="color: var(--secondary);"></i> Update Password</h2>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
              <div class="form-group" style="margin-bottom: 0;">
                <label for="old-password">Current Password</label>
                <input type="password" id="old-password" placeholder="••••••••" required>
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" placeholder="••••••••" required>
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="••••••••" required>
              </div>
            </div>
            
            <button onclick="updatePassword()" style="width: auto; margin-top: 25px; float: right;">
              <i class="fa-solid fa-floppy-disk"></i> Save New Password
            </button>
          </div>

        </div>

      </div>

      <!-- Footer Area -->
      <div id="footer-container"></div>
    </main>
  </div>

  <div id="toast-container"></div>
  <script src="script.js"></script>
</body>
</html>
