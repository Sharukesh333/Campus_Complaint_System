<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Campus Complaint System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <input type="hidden" id="signup-page-marker">

  <div class="auth-card" style="max-width: 500px;">
    <div class="welcome-logo">
      <i class="fa-solid fa-user-plus"></i>
    </div>
    <h2>Create Account</h2>
    <p>Campus Complaint Management System - Demo Version</p>

    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="John Doe" required>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
      <div class="form-group">
        <label for="register">Register Number</label>
        <input type="text" id="register" placeholder="STUDENT02" required>
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX" required>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="student2@college.com" required>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
      <div class="form-group">
        <label for="role">Role</label>
        <select id="role">
          <option value="Student">Student</option>
          <option value="Faculty">Faculty</option>
        </select>
      </div>
      <div class="form-group">
        <label for="department">Department</label>
        <select id="department">
          <option value="1">CSE</option>
          <option value="2">ECE</option>
          <option value="3">EEE</option>
          <option value="4">MECH</option>
          <option value="5">CIVIL</option>
          <option value="6">IT</option>
          <option value="7">MBA</option>
          <option value="8">CSE (Cyber Security)</option>
          <option value="9">CSBS</option>
          <option value="10">AIDS</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>

    <button onclick="signup()"><i class="fa-solid fa-user-check"></i> Register Account</button>

    <div style="margin-top: 25px; font-size: 0.9rem;">
      <span style="color: var(--text-muted);">Already have an account?</span>
      <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 600; margin-left: 5px;">Login here</a>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="script.js"></script>
</body>
</html>
